<!DOCTYPE html>
<html>
    <head>
        <title>profile card</title>
        <style>
            body{
                font-family:Verdana, Geneva, Tahoma, sans-serif;
                background-color: #f2f2f2;


            }
            .card{
                background:white;
                width:100;
                height:100;
                padding: 10px;
                text-align:center;
                margin:100px auto;
                border-radius:10%;
                box-shadow: 0px 0px 10px rgb(0,0,0.1);

            }
            .card img{
                width:100px;
                height:100px;
                border-radius:50%;
            }
            .card h2{
                margin-top:10px;
                color:blue;
            }
          





        </style>
    </head>
    <body>
        <div class="card">
            <img src="cs.jpg" alt="The computer">
        <h2>best computer</h2>
        <p>best for student whose work in Tech industry</p>
        <p>the latest version.with best price</p>
        <button>Contact Me</button>

        
        </div>
    </body>
</html>
