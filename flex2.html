<!DOCTYPE html>
<html>
    <head>
        <title>flex box 2</title>
        <style>
            
        .grid {
               display: flex;
               /*grid-template-columns: repeat(3, 70px);*/
                gap: 10px;
                width:300px;
                justify-content:center;
                align-items: center;
         }
          table {
            border-collapse: collapse;
        }
         td {
            
            width: 60px;
            height: 60px;
            text-align: center;
            background-color: darkslategrey;
            color: white;
            font-weight: bold;
            border: 2px solid white;
        }.
               
            
        </style>
    </head>
    <body>
        <div class="grid">
        <table class="item">
            <tr>
                <td>[1]</td>
                <td>[2]</td>
                <td>[3]</td>
            </tr>
            <tr>
                <td>[4]</td>
                <td>[5]</td>
                <td>[6]</td>
            </tr>
            <tr>
                <td>[7]</td>
                <td>[8]</td>
                <td>[9]</td>
            </tr>
            
        </table>
        </div>

    </body>
</html>
